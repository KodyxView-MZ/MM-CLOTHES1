<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STAFF LOGIN | MM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Plus+Jakarta+Sans:wght@200;400;800&display=swap');
        
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* Vidro jateado premium */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 60px 40px;
            border-radius: 40px;
            position: relative;
            z-index: 10;
        }

        .input-editorial {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .input-editorial:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6;
        }

        .btn-main {
            background: #fff;
            color: #000;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 12px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-main:hover {
            background: #3b82f6;
            color: #fff;
            transform: translateY(-5px);
        }

        .btn-back {
            position: absolute;
            top: 30px;
            left: 30px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            transition: color 0.3s;
        }
        .btn-back:hover { color: #fff; }

        /* Notificação Superior */
        #notif {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            border-radius: 50px;
            font-family: 'Unbounded', sans-serif;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .kodyx-box img {
            max-height: 25px;
            width: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <a href="marketplace.html" class="btn-back">← Voltar ao Marketplace</a>

    <div id="notif"></div>

    <div class="glass-panel">
        <div class="text-center mb-12">
            <h1 style="font-family: 'Unbounded', sans-serif;" class="text-3xl tracking-tighter mb-2 italic">MM_STAFF</h1>
            <p class="text-[9px] uppercase tracking-[0.5em] text-neutral-500">Acesso Restrito ao Arquivo</p>
        </div>

        <form id="loginForm">
            <input type="email" id="email" class="input-editorial" placeholder="Admin_Email" required>
            <input type="password" id="password" class="input-editorial" placeholder="Access_Code" required>
            
            <button type="submit" class="btn-main mt-4">Entrar no Sistema</button>
        </form>

        <div class="mt-16 flex flex-col items-center">
            <div class="h-[1px] w-8 bg-neutral-800 mb-6"></div>
            <p class="text-[8px] uppercase tracking-[0.3em] text-neutral-600 mb-2">Powered By</p>
            
            <div class="kodyx-box">
                <img src="logo_kodyx.png" alt="KODYX ENGINE" onerror="this.parentElement.innerHTML='<span class=\'text-xs font-black tracking-widest text-white\'>KODYX_ENGINE</span>'">
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const notif = document.getElementById('notif');

        function showStatus(msg, color) {
            notif.innerText = msg;
            notif.style.background = color;
            notif.style.color = "#fff";
            notif.style.top = "30px";
            
            setTimeout(() => { notif.style.top = "-100px"; }, 3000);
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const u = document.getElementById('email').value;
            const p = document.getElementById('password').value;

            if (u === "mwaimanjate999@icloud.com" && p === "MW2K26999") {
                showStatus("ACESSO AUTORIZADO", "#3b82f6");
                setTimeout(() => window.location.href = "admin.html", 1500);
            } else {
                showStatus("CREDENCIAIS INVÁLIDAS", "#ff0000");
                gsap.to(".glass-panel", { x: 10, repeat: 3, yoyo: true, duration: 0.05 });
            }
        });
    </script>
</body>
</html>
